version: "3.9"

# ============================================
# moments4u — Local Development Stack
# ============================================
# Usage:
#   docker compose -f infra/docker-compose.yml up -d
#
# This starts all infrastructure services needed
# for local development. Application servers (backend, frontend)
# can be run separately for hot reload.
# ============================================

services:
  # ── PostgreSQL + pgvector ──
  db:
    image: pgvector/pgvector:pg16
    container_name: moments4u-db
    environment:
      POSTGRES_DB: moments4u
      POSTGRES_USER: moments4u
      POSTGRES_PASSWORD: ${DB_PASSWORD:-moments4u_dev}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U moments4u"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ── Redis (Celery broker + cache) ──
  redis:
    image: redis:7-alpine
    container_name: moments4u-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ── MinIO (S3-compatible object storage) ──
  minio:
    image: minio/minio
    container_name: moments4u-minio
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_KEY:-minioadmin}
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # Web console
    command: server /data --console-address ":9001"
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 3

  # ── MinIO bucket setup (runs once) ──
  minio-setup:
    image: minio/mc
    container_name: moments4u-minio-setup
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 $${MINIO_ROOT_USER:-minioadmin} $${MINIO_ROOT_PASSWORD:-minioadmin};
      mc mb local/moments4u-photos --ignore-existing;
      mc anonymous set none local/moments4u-photos;
      echo 'Bucket created successfully';
      "

volumes:
  pgdata:
    driver: local
  minio-data:
    driver: local
